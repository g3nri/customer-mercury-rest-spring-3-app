spring.application.name=customer-service
info.app.version=1.0.0
info.app.description=Customer Service

server.port=8100

log.format=text

web.component.scan=com.deviceshop.customer

cloud.connector=none

snake.case.serialization=true

show.application.properties=server.port, spring.application.name, cloud.connector

# H2 Database
spring.datasource.url=jdbc:h2:mem:customerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
